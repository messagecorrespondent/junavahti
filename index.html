<!DOCTYPE html>
<html lang="fi">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"/>
<meta name="theme-color" content="#0d1117"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-title" content="Junahaku"/>
<title>Junahaku 🚂</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,system-ui,sans-serif;background:#0d1117;color:#e6edf3;min-height:100vh;padding:20px 16px 40px}
h1{font-size:22px;font-weight:700;margin-bottom:4px}
.sub{font-size:14px;color:#7d8590;margin-bottom:24px}
.row{display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap}
input,select{background:#161b22;border:1px solid rgba(255,255,255,.1);border-radius:8px;color:#e6edf3;font-size:15px;padding:10px 13px;flex:1;min-width:0;-webkit-appearance:none}
input:focus,select:focus{outline:none;border-color:#388bfd}
button{background:#1f6feb;color:#fff;border:none;border-radius:8px;font-size:15px;font-weight:600;padding:10px 20px;cursor:pointer;white-space:nowrap}
button:active{opacity:.8}
button:disabled{opacity:.5;cursor:not-allowed}
#status{font-size:14px;color:#7d8590;margin-bottom:16px;min-height:20px}
.card{background:#161b22;border:1px solid rgba(255,255,255,.08);border-radius:12px;padding:16px;margin-bottom:12px}
.train-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;flex-wrap:wrap;gap:8px}
.train-num{font-family:ui-monospace,monospace;font-size:20px;font-weight:700;color:#58a6ff}
.badges{display:flex;gap:6px;flex-wrap:wrap}
.badge{font-size:11px;font-weight:700;padding:3px 8px;border-radius:99px}
.live{background:rgba(63,185,80,.15);color:#3fb950}
.late{background:rgba(248,81,73,.15);color:#f85149}
.early{background:rgba(63,185,80,.15);color:#3fb950}
.cancel{background:rgba(248,81,73,.15);color:#f85149}
.rare{background:rgba(167,139,250,.15);color:#a78bfa}
.section{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:#7d8590;margin:12px 0 6px}
.consist{display:flex;flex-wrap:wrap;gap:5px}
.loco{background:rgba(88,166,255,.1);border:1px solid rgba(88,166,255,.25);color:#58a6ff;border-radius:7px;padding:4px 10px;font-size:12px;font-weight:600}
.loco.rare-loco{background:rgba(167,139,250,.12);border-color:rgba(167,139,250,.3);color:#a78bfa}
.wagon{background:#161b22;border:1px solid rgba(255,255,255,.08);color:#8b9bb4;border-radius:7px;padding:4px 10px;font-size:12px}
.stops{display:flex;flex-direction:column}
.stop{display:grid;grid-template-columns:14px 1fr auto;align-items:start;gap:8px;padding:6px 0;font-size:14px;color:#8b9bb4;border-bottom:1px solid rgba(255,255,255,.05)}
.stop:last-child{border-bottom:none}
.stop.now{color:#e6edf3}
.stop.done{opacity:.35}
.dot{width:7px;height:7px;border-radius:50%;background:rgba(255,255,255,.15);margin-top:4px;flex-shrink:0}
.stop.now .dot{background:#388bfd;box-shadow:0 0 6px #388bfd}
.sname{font-family:ui-monospace,monospace;font-weight:600}
.stime{font-family:ui-monospace,monospace;font-weight:600;text-align:right}
.sdelay{font-size:11px;font-weight:700;color:#f85149;text-align:right}
.track{font-size:11px;color:#7d8590;text-align:right}
.stats{display:grid;grid-template-columns:1fr 1fr 1fr;text-align:center;gap:0;margin-bottom:12px}
.stat{padding:10px 4px;border-right:1px solid rgba(255,255,255,.06)}
.stat:last-child{border-right:none}
.stat-val{font-size:20px;font-weight:700;letter-spacing:-.02em}
.stat-label{font-size:11px;color:#7d8590;margin-top:2px}
.error{background:rgba(248,81,73,.1);border:1px solid rgba(248,81,73,.25);border-radius:12px;padding:16px;color:#f85149;font-size:14px}
</style>
</head>
<body>

<h1>Junahaku 🚂</h1>
<div class="sub">Hakee tiedot suoraan Fintraffic Digitrafficista</div>

<div class="row">
  <input id="tnum" type="number" placeholder="Junanumero, esim. 63" />
  <input id="tdate" type="date" />
</div>
<div class="row">
  <button onclick="hae()" id="btn">Hae junatiedot</button>
</div>

<div id="status"></div>
<div id="out"></div>

<script>
const API = 'https://rata.digitraffic.fi/api/v1';
const RARE = new Set(['Sr1','Sr2','Dr16','Dv12','Dv15r','Hr12','Hr13','TEM']);

// Aseta tämä päivä oletukseksi
document.getElementById('tdate').value = new Date().toISOString().slice(0,10);

async function hae() {
  const num = document.getElementById('tnum').value.trim();
  const date = document.getElementById('tdate').value;
  if (!num) { alert('Anna junanumero'); return; }

  const btn = document.getElementById('btn');
  btn.disabled = true;
  btn.textContent = 'Haetaan…';
  document.getElementById('status').textContent = 'Haetaan Digitrafficista…';
  document.getElementById('out').innerHTML = '';

  try {
    // Hae aikataulu ja kokoonpano rinnakkain
    const [trainRes, compRes] = await Promise.all([
      fetch(`${API}/trains/${date}/${num}`, {
        headers: { 'Digitraffic-User': 'JunaInfo/1.0' }
      }),
      fetch(`${API}/compositions/${date}/${num}`, {
        headers: { 'Digitraffic-User': 'JunaInfo/1.0' }
      }).catch(() => null)
    ]);

    if (!trainRes.ok) {
      throw new Error(`Junaa ${num} ei löydy päivälle ${date} (HTTP ${trainRes.status})`);
    }

    const trainArr = await trainRes.json();
    const train = Array.isArray(trainArr) ? trainArr[0] : trainArr;
    if (!train) throw new Error('Junaa ei löydy');

    let comp = null;
    if (compRes && compRes.ok) {
      comp = await compRes.json();
    }

    document.getElementById('status').textContent = '';
    document.getElementById('out').innerHTML = renderTrain(train, comp);

  } catch(e) {
    document.getElementById('status').textContent = '';
    document.getElementById('out').innerHTML = `<div class="error">⚠️ ${e.message}</div>`;
  }

  btn.disabled = false;
  btn.textContent = 'Hae junatiedot';
}

function renderTrain(train, comp) {
  const delay = getDelay(train);
  const locos = comp?.journeySections?.flatMap(s => s.locomotives || []) || [];
  const wagons = comp?.journeySections?.flatMap(s => s.wagons || []) || [];
  const hasRare = locos.some(l => RARE.has(l.locomotiveType));
  const stops = buildStops(train);
  const currentIdx = stops.findLastIndex(s => s.actual);

  // Badges
  let badges = '';
  if (train.runningCurrently && !train.cancelled) badges += '<span class="badge live">LIVE</span>';
  if (train.cancelled) badges += '<span class="badge cancel">PERUTTU</span>';
  if (hasRare) badges += '<span class="badge rare">⚡ Harvinainen kalusto</span>';
  if (delay > 2) badges += `<span class="badge late">+${delay} min</span>`;
  if (delay < -1) badges += `<span class="badge early">${delay} min</span>`;

  // Nopeus/viive/operaattori
  const locString = locos.map(l => l.locomotiveType).filter(Boolean).join(', ') || '–';
  const statsHTML = `
    <div class="stats">
      <div class="stat"><div class="stat-val" style="${delay>2?'color:#f85149':delay<0?'color:#3fb950':''}">${delay===0?'Ajassa':delay>0?'+'+delay+'m':delay+'m'}</div><div class="stat-label">Viive</div></div>
      <div class="stat"><div class="stat-val">${train.operatorShortCode||'VR'}</div><div class="stat-label">Operaattori</div></div>
      <div class="stat"><div class="stat-val" style="font-size:14px">${locString}</div><div class="stat-label">Veturi</div></div>
    </div>`;

  // Kalusto
  let compHTML = '';
  if (locos.length || wagons.length) {
    const locoChips = locos.map(l => {
      const r = RARE.has(l.locomotiveType);
      return `<span class="loco ${r?'rare-loco':''}">${l.locomotiveType} <span style="opacity:.6;font-size:10px">#${l.vehicleNumber}</span></span>`;
    }).join('');
    const wagonChips = wagons.slice(0,10).map(w =>
      `<span class="wagon">${w.wagonType}</span>`
    ).join('') + (wagons.length>10 ? `<span class="wagon">+${wagons.length-10}</span>` : '');
    compHTML = `<div class="section">Kalusto</div><div class="consist">${locoChips}${wagonChips}</div>`;
  }

  // Aikataulu
  const stopsHTML = stops.map((s, i) => {
    const cls = i === currentIdx ? 'now' : i < currentIdx ? 'done' : '';
    return `<div class="stop ${cls}">
      <div class="dot"></div>
      <div class="sname">${s.code}</div>
      <div>
        ${s.delay > 2 ? `<div class="sdelay">+${s.delay}m</div>` : ''}
        <div class="stime">${s.time}</div>
        ${s.track ? `<div class="track">laituri ${s.track}</div>` : ''}
      </div>
    </div>`;
  }).join('');

  return `<div class="card">
    <div class="train-header">
      <div class="train-num">${train.trainType} ${train.trainNumber}</div>
      <div class="badges">${badges}</div>
    </div>
    ${statsHTML}
    ${compHTML}
    <div class="section">Aikataulu — ${stops.length} pysäkkiä</div>
    <div class="stops">${stopsHTML}</div>
  </div>`;
}

function getDelay(train) {
  if (!train.timetableRows?.length) return 0;
  const last = [...train.timetableRows].reverse().find(r => r.differenceInMinutes != null);
  return last?.differenceInMinutes || 0;
}

function buildStops(train) {
  const seen = new Set(), stops = [];
  for (const r of train.timetableRows || []) {
    if (seen.has(r.stationShortCode)) continue;
    seen.add(r.stationShortCode);
    const dep = train.timetableRows.find(x =>
      x.stationShortCode === r.stationShortCode && x.type === 'DEPARTURE'
    ) || r;
    const t = new Date(dep.liveEstimateTime || dep.scheduledTime);
    stops.push({
      code: r.stationShortCode,
      time: t.toLocaleTimeString('fi-FI', {hour:'2-digit', minute:'2-digit'}),
      delay: dep.differenceInMinutes || 0,
      actual: !!dep.actualTime,
      track: dep.commercialTrack || ''
    });
  }
  return stops;
}

// Enter-näppäin hakee
document.getElementById('tnum').addEventListener('keydown', e => {
  if (e.key === 'Enter') hae();
});
</script>
</body>
</html>
